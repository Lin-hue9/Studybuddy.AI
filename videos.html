{% extends "layout.html" %}
{% block main %}
<h2 class="mb-4" style="color:#4F759B;">📺 StudyBuddy Tutorials & Videos</h2>

<div class="row">
  {% for vid in videos %}
    <div class="col-md-6 mb-4">
      <div class="card glass-bg p-3 h-100">
        <div style="position:relative; padding-bottom:56.25%; height:0; overflow:hidden;">
          <iframe src="{{ vid.embed }}" title="{{ vid.title }}" frameborder="0" allowfullscreen
                  style="position:absolute;top:0;left:0;width:100%;height:100%;"></iframe>
        </div>
        <h5 class="mt-3 mb-1">{{ vid.title }}</h5>
        <span class="badge badge-info mb-1">{{ vid.subject|capitalize }}</span>
        <p class="mb-0" style="font-size:0.97em;">{{ vid.desc }}</p>
      </div>
    </div>
  {% endfor %}
</div>
{% endblock %}
