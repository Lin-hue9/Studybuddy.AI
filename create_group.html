{% extends "layout.html" %}
{% block main %}
<h2>Create a Study Group</h2>
<form action="/create_group" method="post">
    <input name="name" placeholder="Group Name" class="form-control mb-2" type="text" required>
    <textarea name="description" placeholder="Description (optional)" class="form-control mb-2"></textarea>
    <button class="btn btn-success" type="submit">Create Group</button>
</form>
{% endblock %}
